<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#3b82f6"/>

  <!-- Checkbox — centered -->
  <rect x="7" y="7" width="18" height="18" rx="4"
    stroke="white" stroke-width="2" fill="rgba(255,255,255,0.15)"/>

