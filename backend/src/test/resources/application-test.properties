# ── Test profile — uses H2 in-memory DB, no real Supabase connection ──────────
spring.datasource.url=jdbc:h2:mem:peertayo_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable legacy migration (no evaluation_forms table in test DB)
spring.sql.init.mode=never

# JWT
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1wZWVydGF5by10ZXN0aW5nLW9ubHktMTIzNDU2Nzg=
app.jwt.expiration-ms=3600000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Frontend
app.frontend.url=http://localhost:5173

# Google OAuth (dummy values for test — OAuth endpoints not tested here)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
