spring.application.name=peertayo-backend

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# Use profile from environment when provided.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# ── Database (Supabase PostgreSQL via Connection Pooler) ─────────────────────
# Values are loaded from .env file (never commit .env to git)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=604800000

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ── Frontend ──────────────────────────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:5173}


spring.security.oauth2.client.registration.google.client-id=${APP_GOOGLE_CLIENT_ID:${GOOGLE_CLIENT_ID}}
spring.security.oauth2.client.registration.google.client-secret=${APP_GOOGLE_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET}}
spring.security.oauth2.client.registration.google.scope=profile,email
